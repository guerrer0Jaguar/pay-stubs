version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto25
  pre_build:
    commands:
    - echo In the pre_build phase...
  build:
    commands:
    - echo Build started on `date`
  post_build:
    commands:
    - echo Build completed on `date`
    - mvn clean install
    - cd pay-stubs-main-app
    - mkdir -p lib
    - mv target/pay-stubs-main-app-1.0.jar lib/ 
    - zip -r pay-stub-package.zip lib
    - mv pay-stub-package.zip ../pay-stub-package.zip
artifacts:
  files:
  - pay-stub-package.zip
